<!DOCTYPE html>
<html>
<head>
    <title>Emergency SOS - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#11998e,#38ef7d);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:500px;
            border:none;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:40px;
        }

    </style>

</head>
<body>

<div class="card p-4">

    <div class="text-center">

        <div class="logo">🛡️</div>

        <h2>Create Account</h2>

        <p class="text-muted">
            Join Emergency SOS
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>
            <input
                type="text"
                name="full_name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Phone Number</label>
            <input
                type="text"
                name="phone"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                class="form-control"
                required>
        </div>

        <button class="btn btn-success w-100">
            Register
        </button>

    </form>

    <hr>

    <div class="text-center">

        Already have an account?

        <br><br>

        <a href="/login" class="btn btn-outline-success">
            Login
        </a>

    </div>

</div>

</body>
</html>
