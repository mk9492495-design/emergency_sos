<!DOCTYPE html>
<html>
<head>
    <title>Emergency SOS - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#ff4b2b,#ff416c);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:400px;
            border:none;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:40px;
        }
    </style>

</head>
<body>

<div class="card p-4">

    <div class="text-center">
        <div class="logo">🚨</div>
        <h2>Emergency SOS</h2>
        <p class="text-muted">Login to continue</p>
    </div>

    <form method="POST">

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <button class="btn btn-danger w-100">
            Login
        </button>

    </form>

    <hr>

    <div class="text-center">

        Don't have an account?

        <br><br>

        <a href="/register" class="btn btn-outline-danger">
            Register Here
        </a>

    </div>

</div>

</body>
</html>
