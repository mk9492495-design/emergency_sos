<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOS Alert</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.container-box{
    max-width:700px;
    margin:auto;
    margin-top:80px;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

.sos-btn{
    height:120px;
    font-size:32px;
    font-weight:bold;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container container-box">

    <div class="card p-5 text-center">

        <h1 class="mb-4">
            🚨 Emergency SOS
        </h1>

        <p class="mb-4">
            Press the button below to send an emergency alert.
        </p>

        {% if message %}
        <div class="alert alert-success">
            {{ message }}
        </div>
        {% endif %}

        <form method="POST">

            <button
                type="submit"
                class="btn btn-danger w-100 sos-btn">

                🚨 SEND SOS ALERT

            </button>

        </form>

        <hr>

        <a href="/dashboard"
           class="btn btn-primary">

           Back To Dashboard

        </a>

    </div>

</div>

</body>
</html>
