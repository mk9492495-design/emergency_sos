<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.profile-card{
    max-width:700px;
    margin:auto;
    margin-top:50px;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

    <div class="profile-card">

        <div class="card p-4">

            <h2 class="text-center mb-4">
                👤 My Profile
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        value="{{ user.full_name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        value="{{ user.email }}"
                        readonly>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ user.phone }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Address</label>

                    <textarea
                        name="address"
                        class="form-control"
                        rows="3">{{ user.address }}</textarea>

                </div>

                <div class="mb-3">

                    <label>Gender</label>

                    <select
                        name="gender"
                        class="form-control">

                        <option value="Male"
                        {% if user.gender=="Male" %}selected{% endif %}>
                        Male
                        </option>

                        <option value="Female"
                        {% if user.gender=="Female" %}selected{% endif %}>
                        Female
                        </option>

                        <option value="Other"
                        {% if user.gender=="Other" %}selected{% endif %}>
                        Other
                        </option>

                    </select>

                </div>

                <button class="btn btn-success w-100">
                    Update Profile
                </button>

            </form>

            <hr>

            <a href="/dashboard"
               class="btn btn-primary">

                Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
