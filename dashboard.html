<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency SOS Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#dc3545;
    padding-top:20px;
}

.sidebar h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}

.main{
    margin-left:260px;
    padding:20px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h2>🚨 SOS</h2>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/profile">👤 Profile</a>

    <a href="/contacts">📞 Emergency Contacts</a>

    <a href="/sos">🚨 Send SOS</a>

    <a href="/history">📜 Alert History</a>

    <hr style="color:white;">

    <a href="/logout">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

    <h2>Welcome to Emergency SOS System</h2>

    <p>All features are accessible from sidebar</p>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>📞 Contacts</h3>

                <a href="/contacts" class="btn btn-danger mt-2">Manage</a>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>🚨 SOS</h3>

                <a href="/sos" class="btn btn-danger mt-2">Send Alert</a>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>📜 History</h3>

                <a href="/history" class="btn btn-danger mt-2">View</a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
